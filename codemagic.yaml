workflows:
  android-build:
    name: Royal Ludo Android Build
    max_build_duration: 30
    instance_type: mac_mini_m1

    environment:
      java: 17

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make Gradle executable
        script: |
          chmod +x ./gradlew

      - name: Build Debug APK
        script: |
          ./gradlew clean assembleDebug

    artifacts:
      - app/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - princearabdurrahman57@gmail.com
        notify:
          success: true
          failure: true
