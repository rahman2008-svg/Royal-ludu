name: Android APK Auto Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build & Verify APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Create local.properties and env placeholders
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "GEMINI_API_KEY=dummy-key-offline" > .env
          echo "GEMINI_API_KEY=dummy-key-offline" > .env.example

      - name: Grant Execute Permission to Gradle Task Runner
        run: |
          # The system supports direct gradle invocations without wrapper issues,
          # but just in case users create gradlew or run standard commands:
          chmod +x || true

      - name: Assemble Debug APK
        run: gradle assembleDebug

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Royal-Ludo-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
